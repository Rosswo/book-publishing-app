<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Admin - Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 40px;
      margin: 0;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .top-bar a {
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 5px;
      font-size: 14px;
      color: white;
    }

    .library-link { background: #007bff; }
    .logout-link { background: #dc3545; }

    h1 { text-align: center; }

    .form-container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover { background: #4f46e5; }

    .message {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }

    .books-section {
      max-width: 900px;
      margin: auto;
    }

    .book-row {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }

    .delete-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .delete-btn:hover { background: #b52a37; }

    .current-status {
      font-size: 12px;
      margin-top: 5px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="/" class="library-link">← Back to Library</a>
    <a href="/logout" class="logout-link">Logout</a>
  </div>

  <h1>Admin Dashboard</h1>

  <!-- ================= BOOK UPLOAD ================= -->
  <div class="form-container">
    <h2>Upload Book</h2>
    <form id="uploadForm" enctype="multipart/form-data">
      
      <label>Title *</label>
      <input type="text" name="title" required />

      <label>Description</label>
      <input type="text" name="description" />

      <label>Version</label>
      <input type="text" name="version" value="1.0" />

      <label>Word Document (.docx)</label>
      <input type="file" name="docx"
        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

      <label>Original PDF (Optional)</label>
      <input type="file" name="book" accept="application/pdf" />

      <label>Cover Image</label>
      <input type="file" name="cover" accept="image/*" />

      <button type="submit">Upload Book</button>
    </form>

    <div class="message" id="uploadMessage"></div>
  </div>

  <!-- ================= SETTINGS ================= -->
  <div class="form-container">
    <h2>Credits</h2>

    <form id="creditsForm" enctype="multipart/form-data">
      <label>Upload DOCX</label>
      <input type="file" name="docx"
        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

      <label>Or Upload PDF</label>
      <input type="file" name="pdf" accept="application/pdf" />

      <button type="submit">Update Credits</button>
    </form>

    <div class="current-status" id="creditsStatus"></div>
  </div>

  <div class="form-container">
    <h2>Memorial</h2>

    <form id="memorialForm" enctype="multipart/form-data">
      <label>Upload DOCX</label>
      <input type="file" name="docx"
        accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

      <label>Or Upload PDF</label>
      <input type="file" name="pdf" accept="application/pdf" />

      <button type="submit">Update Memorial</button>
    </form>

    <div class="current-status" id="memorialStatus"></div>
  </div>

  <!-- ================= BOOK LIST ================= -->
  <div class="books-section">
    <h2>Existing Books</h2>
    <div id="booksList">Loading...</div>
  </div>

  <script>
    const uploadForm = document.getElementById("uploadForm");
    const uploadMessage = document.getElementById("uploadMessage");
    const booksList = document.getElementById("booksList");

    /* ================= BOOK UPLOAD ================= */

    uploadForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(uploadForm);

      const res = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const result = await res.json();

      if (res.ok) {
        uploadMessage.style.color = "green";
        uploadMessage.textContent = "Book uploaded successfully!";
        uploadForm.reset();
        loadBooks();
      } else {
        uploadMessage.style.color = "red";
        uploadMessage.textContent = result.error || "Upload failed.";
      }
    });

    /* ================= SETTINGS UPLOAD ================= */

    async function handleSettingsUpload(formId, key, statusId) {
      const form = document.getElementById(formId);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        const res = await fetch(`/settings/${key}`, {
          method: "POST",
          body: formData
        });

        const status = document.getElementById(statusId);

        if (res.ok) {
          status.style.color = "green";
          status.textContent = "Updated successfully.";
          form.reset();
        } else {
          status.style.color = "red";
          status.textContent = "Update failed.";
        }
      });
    }

    handleSettingsUpload("creditsForm", "credits", "creditsStatus");
    handleSettingsUpload("memorialForm", "memorial", "memorialStatus");

    /* ================= BOOK LIST ================= */

    async function loadBooks() {
      const res = await fetch("/books");
      const books = await res.json();
      booksList.innerHTML = "";

      books.forEach(book => {
        const row = document.createElement("div");
        row.className = "book-row";

        row.innerHTML = `
          <div>
            <strong>${book.title}</strong>
            <div style="font-size:12px;color:gray;">
              Version: ${book.version} |
              Type: ${book.content_type || 'pdf'}
            </div>
          </div>
          <button class="delete-btn" onclick="deleteBook(${book.id})">
            Delete
          </button>
        `;

        booksList.appendChild(row);
      });
    }

    async function deleteBook(id) {
      if (!confirm("Are you sure?")) return;
      const res = await fetch(`/books/${id}`, { method: "DELETE" });
      if (res.ok) loadBooks();
    }

    loadBooks();
  </script>

</body>
</html>
