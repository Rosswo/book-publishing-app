<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Admin - Dashboard</title>

    <style>
        body {
            font-family: Arial,sans-serif;
            background: #f4f4f4;
            padding: 40px;
            margin: 0;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

            .top-bar a {
                text-decoration: none;
                padding: 8px 12px;
                border-radius: 5px;
                font-size: 14px;
                color: white;
            }

        .library-link {
            background: #007bff;
        }

        .logout-link {
            background: #dc3545;
        }

        h1 {
            text-align: center;
        }

        .form-container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }

            button:hover {
                background: #4f46e5;
            }

        .delete-btn {
            background: #dc3545;
        }

            .delete-btn:hover {
                background: #b52a37;
            }

        .message {
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
        }

        .book-row {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <!-- FIX 7: Opens live library site in a new tab -->
        <a href="https://book-publishing-app.pages.dev" target="_blank" class="library-link">📖 Open Library</a>
        <a href="#" class="logout-link">Node Required</a>
    </div>

    <h1>Admin Dashboard</h1>

    <!-- ================= BOOK UPLOAD ================= -->

    <div class="form-container">

        <h2>Upload Book</h2>

        <form id="uploadForm" enctype="multipart/form-data">

            <label>Title *</label>
            <input type="text" name="title" required />

            <label>Description</label>
            <input type="text" name="description" />

            <label>Word Document (.docx)</label>
            <input type="file"
                   name="docx"
                   accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />

            <label>OR Upload PDF Book</label>
            <input type="file"
                   name="book"
                   accept="application/pdf" />

            <label>Cover Image (Optional)</label>
            <input type="file"
                   name="cover"
                   accept="image/*" />

            <button type="submit">Publish Book</button>

        </form>

        <div class="message" id="uploadMessage"></div>

    </div>

    <!-- ================= CREDITS ================= -->

    <div class="form-container">

        <h2>Upload Ziaktu thuhma (PDF)</h2>

        <form id="creditsForm" enctype="multipart/form-data">
            <input type="file" name="pdf" accept="application/pdf" required />
            <button type="submit">Publish Ziaktu thuhma</button>
        </form>

        <div class="message" id="creditsMessage"></div>

    </div>

    <!-- ================= MEMORIAL ================= -->

    <div class="form-container">

        <h2>Upload Hriatrengna (PDF)</h2>

        <form id="memorialForm" enctype="multipart/form-data">
            <input type="file" name="pdf" accept="application/pdf" required />
            <button type="submit">Publish Hriatrengna</button>
        </form>

        <div class="message" id="memorialMessage"></div>

    </div>

    <!-- ================= BOOK LIST ================= -->

    <div class="form-container">

        <h2>Existing Books</h2>

        <div id="booksList">Loading...</div>

    </div>

    <script>

        const uploadForm = document.getElementById("uploadForm");
        const uploadMessage = document.getElementById("uploadMessage");

        const creditsForm = document.getElementById("creditsForm");
        const creditsMessage = document.getElementById("creditsMessage");

        const memorialForm = document.getElementById("memorialForm");
        const memorialMessage = document.getElementById("memorialMessage");

        const booksList = document.getElementById("booksList");

        /* ================= BOOK UPLOAD ================= */

        uploadForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            uploadMessage.textContent = "Publishing...";
            uploadMessage.style.color = "black";

            const formData = new FormData(uploadForm);

            const res = await fetch("/publish", {
                method: "POST",
                body: formData
            });

            const result = await res.json();

            if (res.ok) {
                uploadMessage.style.color = "green";
                uploadMessage.textContent = "Book published successfully!";
                uploadForm.reset();
                loadBooks();
            } else {
                uploadMessage.style.color = "red";
                uploadMessage.textContent = result.error || "Publish failed.";
            }

        });

        /* ================= CREDITS ================= */

        creditsForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            creditsMessage.textContent = "Uploading...";
            creditsMessage.style.color = "black";

            const formData = new FormData(creditsForm);

            const res = await fetch("/publish-setting/credits", {
                method: "POST",
                body: formData
            });

            const result = await res.json();

            if (res.ok) {
                creditsMessage.style.color = "green";
                creditsMessage.textContent = "Credits updated successfully!";
                creditsForm.reset();
            } else {
                creditsMessage.style.color = "red";
                creditsMessage.textContent = result.error || "Upload failed.";
            }

        });

        /* ================= MEMORIAL ================= */

        memorialForm.addEventListener("submit", async (e) => {

            e.preventDefault();

            memorialMessage.textContent = "Uploading...";
            memorialMessage.style.color = "black";

            const formData = new FormData(memorialForm);

            const res = await fetch("/publish-setting/memorial", {
                method: "POST",
                body: formData
            });

            const result = await res.json();

            if (res.ok) {
                memorialMessage.style.color = "green";
                memorialMessage.textContent = "Memorial updated successfully!";
                memorialForm.reset();
            } else {
                memorialMessage.style.color = "red";
                memorialMessage.textContent = result.error || "Upload failed.";
            }

        });

        /* ================= LOAD BOOKS ================= */

        async function loadBooks() {

            const res = await fetch("/books");
            const books = await res.json();

            booksList.innerHTML = "";

            if (!books.length) {
                booksList.innerHTML = "<p>No books found.</p>";
                return;
            }

            books.forEach(book => {

                const row = document.createElement("div");
                row.className = "book-row";

                row.innerHTML = `
<div>
<strong>${book.title}</strong>
<div style="font-size:12px;color:gray;">
Type: ${book.content_type || "html"}
</div>
</div>
<button class="delete-btn">Delete</button>
`;

                row.querySelector("button").onclick = async () => {

                    if (!confirm("Delete this book permanently?")) return;

                    const res = await fetch("/books/" + book.id, {
                        method: "DELETE"
                    });

                    if (res.ok) loadBooks();
                    else alert("Delete failed.");

                };

                booksList.appendChild(row);

            });

        }

        loadBooks();

    </script>

</body>
</html>
